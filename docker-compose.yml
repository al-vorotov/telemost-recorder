services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recorder
      POSTGRES_PASSWORD: recorder
      POSTGRES_DB: telemost_recorder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # gateway, tg-bot, transcriber — подключим на следующих шагах
  # meeting-worker запускается gateway как subprocess, не как постоянный сервис

volumes:
  pgdata:
